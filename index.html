<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport"
      content="width=device-width,
               initial-scale=1,
               maximum-scale=1,
               minimum-scale=1,
               user-scalable=no,
               viewport-fit=cover">
<title>LOGDAY</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div id="topSticky">
  <div id="topInner">
    <div id="nav">
      <div id="navDate"></div>
      <div id="navRight">
        <button id="toggleBtn" class="iconOnly" type="button" title="表示切替">月</button>
        <button id="settingsBtn" class="iconOnly" type="button" aria-label="設定" title="設定">⚙︎</button>
      </div>
    </div>

    <div id="calendar" class="hidden"></div>
    <div id="weekBar"></div>
  </div>
</div>

<div id="meta">
  <span id="weather"></span>
  <div id="dayNote"></div>
</div>

<div id="entries"></div>

<div id="inputBar">
  <button class="iconBtn" id="plusBtn" type="button" title="追加">＋</button>

  <div id="timeHintWrap" title="時間">
    <div id="timeHint" class="isAuto"></div>
    <input id="logTime" type="time" class="timeOverlay" step="600">
  </div>

  <textarea id="logInput" placeholder="今日のひとこと…"></textarea>
  <button id="saveBtn" type="button">保存</button>

  <div id="previewArea"></div>

  <input id="fileInput" type="file" class="fileInput" accept="*/*">
  <input id="pickPhotoInput" type="file" class="fileInput" accept="image/*" multiple>
  <input id="takePhotoInput" type="file" class="fileInput" accept="image/*" capture="environment">
</div>

<!-- ✅ aria-hiddenは使わず、inertだけでフォーカス/アクセシビリティを安全に制御 -->
<div id="plusSheet" inert>
  <div id="plusSheetBackdrop"></div>
  <div id="plusSheetPanel" role="dialog" aria-modal="true" aria-label="追加">
    <button class="sheetBtn" id="actPhoto" type="button">写真ライブラリ</button>
    <button class="sheetBtn" id="actCamera" type="button">写真を撮る</button>
    <button class="sheetBtn" id="actFile" type="button">ファイルを選択</button>
    <button class="sheetBtn cancel" id="actCancel" type="button">キャンセル</button>
  </div>
</div>

<div id="settingsModal" inert>
  <div id="settingsBackdrop"></div>
  <div id="settingsPanel" role="dialog" aria-modal="true" aria-label="設定">
    <h3>設定</h3>
    <div class="row">
      <button id="exportLogday" class="ghostBtn" type="button">データを書き出す</button>
      <button id="cleanupStorage" class="ghostBtn" type="button">容量を回復</button>

      <label class="ghostBtn" role="button">
        データを復元する
        <input id="importFile" class="fileInput" type="file" accept="application/json" />
      </label>

      <button id="closeSettings" class="ghostBtn" type="button">閉じる</button>
      <button id="timeStepBtn" class="ghostBtn" type="button">分刻み：10分</button>
    </div>
  </div>
</div>

<div id="toast">保存しました</div>

<script src="app.js"></script>

</body>
</html>
